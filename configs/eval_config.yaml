# Evaluation settings — Appendix E

cross_consistency:
  tasks: [1, 2, 3]
  task1_sentences: "6-12"
  task2_accepted_count: 10
  task2_rejected_count: 10
  task3_edge_case_strings:
    - "aaababbb"
    - "babbabaab"
    - "ababbbaab"

dfa_construction:
  prompting_strategy: tree_of_thought
  tot_branches: 2                 # intuitive + derivative
  max_retries_per_branch: 3
  temperature: 0.0
  max_tokens: 4000

dfa_verification:
  equivalence_check_max_len: 6   # all strings up to this length
  require_completeness: true
  require_determinism: true
  no_partial_credit: true

failure_modes:
  semantic_interpretation:        # Task 1
    i:   anchor_hallucination
    ii:  nullability_neglect
    iii: atomic_unit_blindness
    iv:  scope_and_nesting_confusion
  generative_execution:           # Task 2
    v:   pseudo_structural_hallucination
    vi:  simple_path_bias
    vii: complexity_aversion
  execution_reasoning:            # Task 3
    viii: trace_fabrication
    ix:   greedy_parsing_failures
    x:    indexing_and_positional_drift
    xi:   descriptive_operational_dissonance
  dfa_construction:               # Section 3
    P1: kleene_star_misinterpretation
    P2: brzozowski_derivative_error
    P3: incorrect_preminimization_structure
    P4: over_acceptance
    P5: boundary_condition_loss_under_concatenation
    P6: redundant_states
